<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Détail Produit</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(180deg,#0f172a,#020617);
color:white;
display: flex;
justify-content: center;
min-height: 100vh;
padding:15px;
box-sizing: border-box;
}

.product-card{
background:#1e293b;
border-radius:20px;
padding:20px;
text-align:center;
width: 100%;
max-width: 400px;
}

.product-card img{
width:100%;
max-width: 200px;
height: auto;
border-radius:15px;
margin-bottom:15px;
object-fit: cover;
}

h2{
    margin-bottom: 10px;
}

.description{
    font-size: 14px;
    color: #cbd5f5;
    margin-bottom: 10px;
}

.price{
font-size:22px;
color:#f59e0b;
margin:10px 0;
font-weight: bold;
}

.revenu{
color:#22c55e;
margin-bottom: 10px;
}

.duration{
    font-size: 13px;
    color: #94a3b8;
}

button{
margin-top:20px;
width: 100%;
padding:14px;
background:#f59e0b;
border:none;
border-radius:12px;
color:white;
font-weight:bold;
cursor: pointer;
transition: 0.3s;
}

@media(max-width:480px){
    .product-card{
        padding: 15px;
    }

    .price{
        font-size: 18px;
    }
}

</style>

</head>

<body>

<div class="product-card">

<img src="{{produit.photo.url}}">

<h2>{{produit.nom}}</h2>

<p class="description">{{produit.description}}</p>

<div class="price">
Prix : {{produit.prix}} FC
</div>

<div class="revenu">
Revenu quotidien : {{produit.revenu_journalier}} FC
</div>

<p class="duration">
Durée : 90 jours
</p>

<form method="POST" action="{% url 'detail_produit' produit.id %}">

{% csrf_token %}

<button>
Acheter ce produit
</button>

</form>

</div>

</body>
</html>
