<!DOCTYPE html>
<html>
<head>
<title>Retrait</title>

<style>

body{
font-family:Arial;
background:linear-gradient(180deg,#0f172a,#020617);
color:white;
padding:20px;
}

.form-box{
background:#1e293b;
padding:20px;
border-radius:15px;
max-width:400px;
margin:auto;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#2563eb;
border:none;
border-radius:10px;
color:white;
font-weight:bold;
}

</style>

</head>

<body>

<div class="form-box">

<h2>Demande de Retrait</h2>

<form method="POST">

{% csrf_token %}

<div class="container">
    <div class="form-card">
        {% if form.errors %}
            <div class="error">
                {% for field in form %}
                    {% for error in field.errors %}
                        <p>{{ error }}</p>
                    {% endfor %}
                {% endfor %}
            </div>
        {% endif %}
        <form method="POST">
            {% csrf_token %}
            <label for="id_montant">Montant</label>
            {{ form.montant }}
            <label for="id_nom_compte">Nom du compte</label>
            {{ form.nom_compte }}
            <label for="id_numero_reception">Numéro du compte</label>
            {{ form.numero_reception }}
            <button type="submit">Soumettre le retrait</button>
        </form>
    </div>

</div>
    
</body>
