<!DOCTYPE html>
<html>
<head>
<title>Parrainage</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(180deg,#0f172a,#020617);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#1e293b;
    padding:30px;
    border-radius:20px;
    width:90%;
    max-width:500px;
    box-shadow:0px 5px 20px rgba(0,0,0,0.5);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input, .form-field{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background:#0f172a;
    color:white;
}

button{
    width:100%;
    padding:12px;
    background:#f59e0b;
    border:none;
    border-radius:10px;
    font-weight:bold;
    color:white;
    margin-top:10px;
}

a{
    color:#38bdf8;
    text-decoration:none;
}

.footer{
    text-align:center;
    margin-top:15px;
}

.filleuls-list{
    margin-top:20px;
    background:#0f172a;
    padding:15px;
    border-radius:15px;
}

.filleul-item{
    padding:8px 0;
    border-bottom:1px solid #1e293b;
}

.filleul-item:last-child{
    border-bottom:none;
}

.copy-link{
    width:100%;
    padding:10px;
    background:#1e293b;
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;
    text-align:center;
    margin-top:10px;
}
</style>

</head>
<body>

<div class="card">
<h2>Parrainage</h2>

<p>Votre lien de parrainage :</p>
<input type="text" value="{{ referral_link }}" id="refLink" readonly>

<button class="copy-link" onclick="copyLink()">Copier le lien</button>

<div class="filleuls-list">
    <h3>Vos filleuls :</h3>
    {% if filleuls %}
        {% for f in filleuls %}
            <div class="filleul-item">{{ f.user.username }} - Inscrit le {{ f.user.date_joined|date:"d/m/Y" }}</div>
        {% endfor %}
    {% else %}
        <p>Aucun filleul pour le moment.</p>
    {% endif %}
</div>

<div class="footer">
    <a href="{% url 'dashboard' %}">Retour au dashboard</a>
</div>

<script>
function copyLink() {
    const copyText = document.getElementById("refLink");
    copyText.select();
    copyText.setSelectionRange(0, 99999);
    navigator.clipboard.writeText(copyText.value);
    alert("Lien copié !");
}
</script>

</div>

</body>
</html>
