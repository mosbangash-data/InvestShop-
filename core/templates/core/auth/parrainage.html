<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parrainage</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:linear-gradient(180deg,#0f172a,#020617);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding: 10px;
    box-sizing: border-box;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:20px;
    width:100%;
    max-width:500px;
    box-shadow:0px 5px 20px rgba(0,0,0,0.5);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#0f172a;
    color:white;
    font-size: 14px;
    box-sizing: border-box;
}

button{
    width:100%;
    padding:12px;
    background:#f59e0b;
    border:none;
    border-radius:10px;
    font-weight:bold;
    color:white;
    margin-top:10px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover{
    transform: scale(1.03);
}

.copy-link{
    background: #1e293b;
}

.footer a{
    color:#38bdf8;
    text-decoration:none;
}

.footer{
    text-align:center;
    margin-top:15px;
}

.filleuls-list{
    margin-top:20px;
    background:#0f172a;
    padding:15px;
    border-radius:15px;
}

.filleul-item{
    padding:10px 0;
    border-bottom:1px solid #1e293b;
    font-size: 14px;
}

.filleul-item:last-child{
    border-bottom:none;
}

@media(max-width:480px){
    .card{
        padding: 20px;
    }

    h2{
        font-size: 20px;
    }

    input{
        font-size: 13px;
    }

    .filleul-item{
        font-size: 13px;
    }
}

</style>

</head>
<body>

<div class="card">
<h2>Parrainage</h2>

<p>Votre lien de parrainage :</p>
<input type="text" value="{{ referral_link }}" id="refLink" readonly>

<button class="copy-link" onclick="copyLink()">Copier le lien</button>

<div class="filleuls-list">
    <h3>Vos filleuls :</h3>
    {% if filleuls %}
        {% for f in filleuls %}
            <div class="filleul-item">{{ f.user.username }} - Inscrit le {{ f.user.date_joined|date:"d/m/Y" }}</div>
        {% endfor %}
    {% else %}
        <p>Aucun filleul pour le moment.</p>
    {% endif %}
</div>

<div class="footer">
    <a href="{% url 'dashboard' %}">Retour au dashboard</a>
</div>

<script>
function copyLink() {
    const copyText = document.getElementById("refLink");
    navigator.clipboard.writeText(copyText.value);
    alert("Lien copié !");
}
</script>

</div>

</body>
</html>
