<!DOCTYPE html>
<html>
<head>

<title>Connexion</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#0f172a,#020617);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{

background:#1e293b;
padding:30px;
border-radius:20px;
width:90%;
max-width:400px;
box-shadow:0px 5px 20px rgba(0,0,0,0.5);

}

h2{
text-align:center;
margin-bottom:20px;
}

input{

width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
background:#0f172a;
color:white;

}

button{

width:100%;
padding:12px;
background:#22c55e;
border:none;
border-radius:10px;
font-weight:bold;
color:white;
margin-top:10px;

}

a{
color:#38bdf8;
text-decoration:none;
}

.footer{
text-align:center;
margin-top:15px;
}

</style>

</head>

<body>

<div class="card">

<h2>Connexion</h2>

<form method="POST">

{% csrf_token %}

<input type="text" name="username" placeholder="Nom d'utilisateur">

<input type="password" name="password" placeholder="Mot de passe">

<button type="submit">
Se connecter
</button>

</form>

<div class="footer">

Pas encore de compte ?

<a href="{% url 'register' %}">
Créer un compte
</a>

</div>

</div>

</body>
</html>
