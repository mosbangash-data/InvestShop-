<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Produits</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(180deg,#0f172a,#020617);
color:white;
}

.header{
text-align:center;
padding:20px;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
}

.product{
background:#1e293b;
border-radius:15px;
padding:15px;
display:flex;
align-items:center;
margin-bottom:15px;
gap: 10px;
}

.product img{
width:70px;
height:70px;
border-radius:10px;
object-fit: cover;
}

.product-info{
flex:1;
font-size: 16px;
}

.product a{
background:#f59e0b;
border:none;
padding:10px 15px;
border-radius:10px;
color:white;
font-weight:bold;
text-decoration: none;
font-size: 14px;
}

.navbar{
position:fixed;
bottom:0;
width:100%;
background:#020617;
display:flex;
justify-content:space-around;
padding:10px 0;
}

.navbar a{
color:#facc15;
text-decoration:none;
font-size:12px;
text-align:center;
}

@media(max-width:480px){
    .product{
        flex-direction: row;
    }

    .product-info{
        font-size: 13px;
    }

    .product img{
        width: 60px;
        height: 60px;
    }
}

</style>

</head>

<body>

<div class="header">
Liste des Produits
</div>

<div class="container">

{% for produit in produits %}

<div class="product">

<img src="{{ produit.photo.url }}" alt="{{ produit.nom }}">

<div class="product-info">

<strong>{{produit.nom}}</strong><br>
Investissez et obtenez revenus journaliers<br>
Prix : {{produit.prix}} FC<br>
Revenu quotidien : {{produit.revenu_journalier}} FC<br>
Durée : {{produit.duree_jours}} Jours<br>

</div>
<a href="{% url 'detail_produit' produit.id %}">
    Voir
</a>

</div>

{% endfor %}

</div>

</body>
</html>
